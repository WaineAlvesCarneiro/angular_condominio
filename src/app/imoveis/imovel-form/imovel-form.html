<h2>Cadastro de Imovel</h2>

<form style="background-color: bisque;" class="form-container" (ngSubmit)="salvar()" autocomplete="off">
   <div *ngIf="imovel.id !== 0" style="padding-top: 15px; padding-left: 8px;" class="form-group">
    <label for="id">Código:</label>
    <input style="margin-left: 15px;" type="number" id="id" [(ngModel)]="imovel.id" name="id" required min="1"/>
  </div>

  <div style="padding-top: 15px; padding-left: 8px;" class="form-group">
    <label for="bloco">Bloco:</label>
    <input style="margin-left: 15px;" id="bloco" [(ngModel)]="imovel.bloco" name="bloco" required />
  </div>

  <div style="padding-top: 15px; padding-left: 8px;" class="form-group">
    <label for="apartamento">Apartamento:</label>
    <input style="margin-left: 15px;" id="apartamento" [(ngModel)]="imovel.apartamento" name="apartamento" required />
  </div>

  <div style="padding-top: 15px; padding-left: 8px;" class="form-group">
    <label for="boxGaragem">Box Garagem:</label>
    <input style="margin-left: 15px;" id="boxGaragem" [(ngModel)]="imovel.boxGaragem" name="boxGaragem" required />
  </div>

  <div style="margin-top: 15px; margin-left: 15px; padding-top: 15px; padding-left: 8px;" class="form-actions">
    <button type="submit" class="btn primary">Salvar</button>
    <button style="margin-bottom: 24px; margin-left: 15px;" type="button" class="btn secondary" routerLink="/imoveis">Cancelar</button>
  </div>
</form>
