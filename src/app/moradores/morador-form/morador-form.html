<h2>Cadastro de Morador</h2>

<form style="background-color: bisque;" class="form-container" (ngSubmit)="salvar()" autocomplete="off">
  <div *ngIf="morador.id !== 0" style="padding-top: 15px; padding-left: 8px;" class="form-group">
    <label for="id">Código:</label>
    <input style="margin-left: 15px;" type="number" id="id" [(ngModel)]="morador.id" name="id" required min="1" disabled="true"/>
  </div>

  <div style="padding-top: 15px; padding-left: 8px;" class="form-group">
    <label for="nome">Nome:</label>
    <input style="width: 350px; margin-left: 15px;" id="nome" [(ngModel)]="morador.nome" name="nome" required />
  </div>

  <div style="padding-top: 15px; padding-left: 8px;" class="form-group">
    <label for="celular">Celular:</label>
    <input style="margin-left: 15px;" id="celular" [(ngModel)]="morador.celular" name="celular" required />
  </div>

  <div style="padding-top: 15px; padding-left: 8px;" class="form-group">
    <label for="email">E-mail:</label>
    <input style="width: 350px; margin-left: 15px;" id="email" [(ngModel)]="morador.email" name="xyz123" required autocomplete="new-email"/>
  </div>

  <div style="padding-top: 15px; padding-left: 3px;" class="form-group checkbox-group">
    <label>
      <input type="checkbox" [(ngModel)]="morador.isProprietario" name="isProprietario" />
      Proprietário
    </label>
  </div>

  <div style="padding-top: 15px; padding-left: 8px;" class="form-group">
    <label for="dataEntrada">Data Entrada:</label>
    <input style="width: 150px; margin-left: 15px;" type="date" [(ngModel)]="morador.dataEntrada" name="dataEntrada" required>
  </div>

  <div *ngIf="morador.id !== 0" style="padding-top: 15px; padding-left: 8px;" class="form-group">
    <label for="dataSaida">Data Saída:</label>
    <input style="width: 150px; margin-left: 15px;" type="date" [(ngModel)]="morador.dataSaida" name="dataSaida">
  </div>
  
  <div style="padding-top: 15px; padding-left: 8px;" class="form-group">
    <label for="imovel">Imóvel:</label>
    <select style="width: 180px; margin-left: 15px;" [(ngModel)]="morador.imovelId" name="imovelId" required>
      <option *ngFor="let imovel of imoveis" [value]="imovel.id">
        Bloco {{ imovel.bloco }} - Apto {{ imovel.apartamento }}
      </option>
    </select>
  </div>

  <div style="margin-top: 15px; margin-left: 15px; padding-top: 15px; padding-left: 8px;" class="form-actions">
    <button type="submit" class="btn primary">Salvar</button>
    <button style="margin-bottom: 24px; margin-left: 15px;" type="button" class="btn secondary" routerLink="/moradores">Cancelar</button>
  </div>
</form>
